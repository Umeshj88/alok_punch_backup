services:
  web:
    build: .
    platform: linux/amd64
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:5.7
    platform: linux/amd64
    command:
      - --sql-mode=
      - --character-set-server=utf8
      - --collation-server=utf8_general_ci
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
      - ./fee_session.sql:/docker-entrypoint-initdb.d/01-fee_session.sql:ro
      - ./2017-2018 (1).sql:/docker-entrypoint-initdb.d/02-2017-2018.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer:4
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql-data:
